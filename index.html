<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>My Library - Fichário Minimalista</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>

    <h1>MY LIBRARY</h1>

    <button id="btn-abrir-form" onclick="abrirFormulario()">+ Adicionar Novo Livro</button>

    <div id="modalFormulario" class="modal-bg" onclick="fecharFormulario()">
        <div class="form-container" onclick="event.stopPropagation()">
            <h2>Novo Livro</h2>
            <input type="text" id="capa-input" placeholder="Link da imagem da capa">
            <input type="text" id="titulo-input" placeholder="Nome do Livro">
            <div class="rating">
                <p>Sua nota:</p>
                <input type="radio" name="estrela" value="1" id="e1"><label for="e1">1</label>
                <input type="radio" name="estrela" value="2" id="e2"><label for="e2">2</label>
                <input type="radio" name="estrela" value="3" id="e3"><label for="e3">3</label>
                <input type="radio" name="estrela" value="4" id="e4"><label for="e4">4</label>
                <input type="radio" name="estrela" value="5" id="e5" checked><label for="e5">5</label>
            </div>
            <textarea id="notas-input" placeholder="Suas notas..."></textarea>
            <button onclick="adicionarLivro()">Salvar na Estante</button>
        </div>
    </div>

    <div class="estante">
        <div class="livro-item" onclick="abrirFichario('O Pequeno Príncipe', '★★★★★', 'Este livro é uma lição de vida. A cada vez que leio, descubro algo novo sobre o essencial que é invisível aos olhos.')">
            <img src="https://m.media-amazon.com/images/I/71lih9979vL.jpg" class="capa" alt="Capa">
            <div class="estrelas-mini">★★★★★</div>
        </div>
    </div>

    <div id="modalFichario" class="modal" onclick="fecharFichario()">
        <div class="fichario" onclick="event.stopPropagation()">
            <span class="fechar" onclick="fecharFichario()">&times;</span>
            
            <div class="furos">
                <div class="furo"></div>
                <div class="furo"></div>
                <div class="furo"></div>
            </div>

            <div class="header-fichario">
                <h2 id="modal-titulo">Título do Livro</h2>
                <div id="modal-estrelas" class="estrelas-fichario"></div>
            </div>

            <div class="notas" id="modal-notas">
                Suas anotações aparecerão aqui...
            </div>
        </div>
    </div>

    <script>
        function abrirFichario(titulo, estrelas, notas) {
            document.getElementById('modal-titulo').innerText = titulo;
            document.getElementById('modal-estrelas').innerText = estrelas;
            document.getElementById('modal-notas').innerText = notas;
            document.getElementById('modalFichario').style.display = 'flex';
        }

        function fecharFichario() {
            document.getElementById('modalFichario').style.display = 'none';
        }
        function abrirFormulario() {
            document.getElementById('modalFormulario').style.display = 'flex';
        }

        function fecharFormulario() {
            document.getElementById('modalFormulario').style.display = 'none';
        }
       // 1. Criamos uma lista (Array) para guardar os livros na memória

        let meusLivros = JSON.parse(localStorage.getItem('biblioteca')) || [];
        // 2. Função para "Desenhar" os livros que estão salvos

        function renderizarLivros() {
            const estante = document.querySelector('.estante');
            estante.innerHTML = ""; // Limpa a estante antes de desenhar
            meusLivros.forEach((livro, index) => {
                const novoLivro = document.createElement('div');
                novoLivro.className = 'livro-item';
                // Passamos os dados salvos para o clique do fichário
                novoLivro.onclick = () => abrirFichario(livro.titulo, livro.estrelas, livro.notas);
                novoLivro.innerHTML = `
                    <img src="${livro.capa}" class="capa" onerror="this.src='https://via.placeholder.com/150x220?text=Sem+Capa'">
                    <div class="estrelas-mini">${livro.estrelas}</div>
                `;
                estante.appendChild(novoLivro);
            });

        }


// 3. Atualizamos a função de ADICIONAR
        function adicionarLivro() {
            const titulo = document.getElementById('titulo-input').value;
            const notas = document.getElementById('notas-input').value;
            const capa = document.getElementById('capa-input').value || 'https://via.placeholder.com/150x220';

            const estrelaRating = document.querySelector('input[name="estrela"]:checked').value;
            const estrelasTexto = "★".repeat(estrelaRating) + "☆".repeat(5 - estrelaRating);


            // Criamos um objeto "Livro"

            const novoLivroObj = {
                titulo: titulo,
                notas: notas,
                capa: capa,
                estrelas: estrelasTexto
            };


            // Adicionamos na nossa lista e salvamos no "banco de dados" do navegador
            meusLivros.push(novoLivroObj);
            localStorage.setItem('biblioteca', JSON.stringify(meusLivros));
            renderizarLivros(); // Redesenha a estante
            fecharFormulario();

            // Limpa os campos
            document.getElementById('titulo-input').value = "";
            document.getElementById('notas-input').value = "";

    }
        // 4. Executa a renderização assim que a página carrega

        window.onload = renderizarLivros; 
    </script>
    

</body>
</html>
