<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>My Library - Fichário Minimalista</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rouge+Script&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <h1>My Library</h1>

    <button id="btn-abrir-form" onclick="abrirFormulario()">+ Adicionar Novo Livro</button>

    <div id="modalFormulario" class="modal-bg" onclick="fecharFormulario()">
        <div class="form-container" onclick="event.stopPropagation()">
            <h2>Novo Livro</h2>
            <input type="file" id="capa-input" accept="image/*">
            <input type="text" id="titulo-input" placeholder="Nome do Livro">
            <div class="rating">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
            <textarea id="notas-input" placeholder="Suas notas..."></textarea>
            <button onclick="adicionarLivro()">Salvar na Estante</button>
        </div>
    </div>

    <div class="estante">
        <div class="livro-item" onclick="abrirFichario('O Pequeno Príncipe', '★★★★★', 'Este livro é uma lição de vida. A cada vez que leio, descubro algo novo sobre o essencial que é invisível aos olhos.')">
            <img src="https://m.media-amazon.com/images/I/71lih9979vL.jpg" class="capa" alt="Capa">
            <div class="estrelas-mini">★★★★★</div>
        </div>
    </div>

    <div id="modalFichario" class="modal" onclick="fecharFichario()">
        <div class="fichario" onclick="event.stopPropagation()">
            <span class="fechar" onclick="fecharFichario()">&times;</span>
            
            <div class="furos">
                <div class="furo"></div>
                <div class="furo"></div>
                <div class="furo"></div>
            </div>

            <div class="header-fichario">
                <h2 id="modal-titulo">Título do Livro</h2>
                <div id="modal-estrelas" class="estrelas-fichario"></div>
            </div>

            <div class="notas" id="modal-notas">
                Suas anotações aparecerão aqui...
            </div>
            <button onclick="editarLivro()">✏ Editar</button>
        </div>
    </div>

    <script src="./js/script.js"></script>
    

</body>
</html>
